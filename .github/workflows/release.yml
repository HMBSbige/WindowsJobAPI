name: Release

on:
  push:
    tags: [ '*' ]

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test -c Release

  pack:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
      - name: Pack
        working-directory: src/WindowsJobAPI
        run: dotnet pack -p:Version=${GITHUB_REF_NAME#v}
      - name: NuGet Login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Push to NuGet
        working-directory: artifacts/package/release
        run: |
          dotnet nuget push *.nupkg -s https://api.nuget.org/v3/index.json -k ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate
          dotnet nuget push *.nupkg -s https://nuget.pkg.github.com/HMBSbige -k ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
      - name: GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: artifacts/package/release/*.nupkg
          immutableCreate: true
          updateOnlyUnreleased: true
